<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendar Picker</title>
  <style>
    :root { font-size: 18px; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      padding: 12px;
      overflow-x: hidden;
    }

    .app {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 14px;
      padding: 16px;
    }

    /* ── CALENDAR ── */
    .cal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .cal-header h2 {
      font-size: 1rem;
      font-weight: 600;
      text-transform: capitalize;
      color: #a78bfa;
    }

    .nav-btn {
      background: #2d3148;
      border: none;
      color: #e2e8f0;
      width: 28px;
      height: 28px;
      border-radius: 7px;
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    .nav-btn:hover { background: #3d4268; }

    .cal-weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      margin-bottom: 6px;
    }

    .cal-weekdays span {
      text-align: center;
      font-size: 0.65rem;
      font-weight: 600;
      color: #6b7280;
      padding: 3px 0;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
    }

    .day-cell {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 7px;
      font-size: 0.78rem;
      cursor: pointer;
      border: 1px solid transparent;
      transition: background 0.12s, border-color 0.12s;
      user-select: none;
    }

    .day-cell:hover:not(.empty):not(.other-month) { background: #2d3148; }
    .day-cell.other-month { color: #374151; cursor: default; }
    .day-cell.today { border-color: #a78bfa; color: #a78bfa; font-weight: 700; }
    .day-cell.selected { background: #7c3aed; color: #fff; font-weight: 700; border-color: transparent; }
    .day-cell.selected.today { border-color: transparent; }

    /* ── TIME PICKER ── */
    .time-picker { width: 200px; text-align: center; }

    .time-picker h3 {
      font-size: 0.85rem;
      font-weight: 600;
      color: #a78bfa;
      margin-bottom: 10px;
    }

    .time-scroll {
      max-height: 180px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #3d4268 transparent;
    }

    .time-scroll::-webkit-scrollbar { width: 4px; }
    .time-scroll::-webkit-scrollbar-thumb { background: #3d4268; border-radius: 4px; }

    .time-row {
      display: flex;
      gap: 2px;
      margin-bottom: 2px;
    }

    .time-slot {
      flex: 1;
      text-align: center;
      padding: 5px 1px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 0.68rem;
      color: #6b7280;
      transition: background 0.12s, color 0.12s;
      user-select: none;
    }

    .time-slot.hour-start { font-weight: 700; color: #9ca3af; }
    .time-slot:hover { background: #2d3148; color: #e2e8f0; }
    .time-slot.selected { background: #7c3aed; color: #fff; font-weight: 600; }

    /* ── DURATION ── */
    .duration-row {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 5px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #2d3148;
    }

    .duration-row label { font-size: 0.78rem; color: #9ca3af; }

    .duration-select {
      background: #2d3148;
      border: 1px solid #3d4268;
      color: #e2e8f0;
      border-radius: 7px;
      padding: 5px 8px;
      font-size: 0.8rem;
      cursor: pointer;
      outline: none;
      flex: 1;
    }
    .duration-select:focus { border-color: #7c3aed; }

    /* ── RESULT ── */
    .result-card {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .result-text {
      font-size: 1.05rem;
      font-weight: 700;
      color: #a78bfa;
      letter-spacing: 0.02em;
      font-family: 'Cascadia Code', 'Consolas', monospace;
      word-break: break-all;
      min-height: 1.4em;
    }

    .result-placeholder {
      font-size: 0.85rem;
      font-weight: 400;
      color: #4b5563;
      font-family: inherit;
    }

    .copy-btn {
      background: #7c3aed;
      border: none;
      color: #fff;
      padding: 9px 0;
      border-radius: 9px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      transition: background 0.15s, transform 0.1s;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .copy-btn:hover { background: #6d28d9; }
    .copy-btn:active { transform: scale(0.98); }
    .copy-btn:disabled { background: #374151; color: #6b7280; cursor: default; transform: none; }
    .copy-btn.copied { background: #059669; }

    /* ── ADD BUTTON ── */
    .add-btn {
      background: transparent;
      border: 1px dashed #3d4268;
      color: #a78bfa;
      padding: 6px 0;
      border-radius: 9px;
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 600;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s;
      margin-top: 8px;
    }
    .add-btn:hover:not(:disabled) { background: #1e2235; border-color: #a78bfa; }
    .add-btn:disabled { color: #374151; border-color: #252840; cursor: default; }

    /* ── STACK ── */
    .stack-section {
      flex-direction: column;
      gap: 8px;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #2d3148;
    }

    .stack-list {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .stack-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.72rem;
      color: #9ca3af;
      padding: 4px 8px;
      border-radius: 6px;
      background: #12141e;
      gap: 6px;
    }

    .stack-remove {
      background: none;
      border: none;
      color: #4b5563;
      cursor: pointer;
      font-size: 1rem;
      padding: 0;
      line-height: 1;
      flex-shrink: 0;
    }
    .stack-remove:hover { color: #ef4444; }

    .stack-output {
      font-size: 0.82rem;
      font-weight: 600;
      color: #a78bfa;
      font-family: 'Cascadia Code', 'Consolas', monospace;
      word-break: break-all;
      padding: 8px;
      background: #12141e;
      border-radius: 7px;
      line-height: 1.5;
      min-height: 2em;
    }

    .aggregate-btn {
      background: #2d3148;
      border: 1px solid #3d4268;
      color: #e2e8f0;
      padding: 7px 0;
      border-radius: 9px;
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 600;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    .aggregate-btn:hover { background: #3d4268; }

    .result-actions {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .result-actions .copy-btn { width: auto; flex: 1; }

    .format-btns { display: flex; gap: 3px; flex-shrink: 0; }

    .fmt-btn {
      background: #2d3148;
      border: 1px solid #3d4268;
      color: #9ca3af;
      width: 28px;
      height: 28px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.65rem;
      font-weight: 700;
      font-family: inherit;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .fmt-btn:hover { background: #3d4268; color: #e2e8f0; }
    .fmt-btn.active { background: #7c3aed; border-color: #7c3aed; color: #fff; }
    .fmt-btn.strike-btn { text-decoration: line-through; }
    .fmt-btn.strike-btn.active { background: #be123c; border-color: #be123c; color: #fff; }
  </style>
</head>
<body>
<div class="app">

  <!-- CALENDAR -->
  <div class="card">
    <div class="cal-header">
      <button class="nav-btn" id="prevMonth">&#8249;</button>
      <h2 id="monthLabel"></h2>
      <button class="nav-btn" id="nextMonth">&#8250;</button>
    </div>
    <div class="cal-weekdays" id="calWeekdays"></div>
    <div class="cal-grid" id="calGrid"></div>
  </div>

  <!-- TIME PICKER -->
  <div class="card time-picker">
    <h3 id="timePickerLabel"></h3>
    <div class="time-scroll" id="timeScroll"></div>
    <div class="duration-row">
      <label id="durationLabel"></label>
      <select class="duration-select" id="durationSelect">
        <option value="15">15 min</option>
        <option value="30">30 min</option>
        <option value="45" selected>45 min</option>
        <option value="60">60 min</option>
        <option value="90">90 min</option>
        <option value="120">120 min</option>
      </select>
    </div>
  </div>

  <!-- RESULT -->
  <div class="card result-card">
    <div class="result-text" id="resultText">
      <span class="result-placeholder">Wybierz datę i godzinę…</span>
    </div>
    <button class="add-btn" id="addBtn" disabled>+ Dodaj</button>

    <div class="stack-section" id="stackSection" style="display:none">
      <div class="stack-list" id="stackList"></div>
      <div class="stack-output" id="stackOutput"></div>
      <button class="aggregate-btn" id="aggregateBtn">Agreguj</button>
    </div>

    <div class="result-actions">
      <div class="format-btns">
        <button class="fmt-btn" data-fmt="h1" title="Huge (Gmail Huge)">H1</button>
        <button class="fmt-btn active" data-fmt="h2" title="Large (Gmail Large)">H2</button>
        <button class="fmt-btn" data-fmt="p" title="Paragraph">P</button>
        <button class="fmt-btn" data-fmt="n" title="Normal (bez formatowania)">N</button>
        <button class="fmt-btn strike-btn" id="strikeBtn" title="Przekreślenie">S</button>
      </div>
      <button class="copy-btn" id="copyBtn" disabled>Kopiuj</button>
    </div>
  </div>

</div>

<script src="sidebar.js"></script>
</body>
</html>
