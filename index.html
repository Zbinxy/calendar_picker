<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendar Picker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .app {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 900px;
      width: 100%;
    }

    .card {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 16px;
      padding: 24px;
    }

    /* ── CALENDAR ── */
    .calendar { width: 320px; }

    .cal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .cal-header h2 {
      font-size: 1.1rem;
      font-weight: 600;
      text-transform: capitalize;
      color: #a78bfa;
    }

    .lang-btns {
      display: flex;
      gap: 4px;
      justify-content: flex-end;
      margin-bottom: 12px;
    }

    .lang-btn {
      background: #2d3148;
      border: 1px solid #3d4268;
      color: #6b7280;
      padding: 3px 8px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 0.68rem;
      font-weight: 700;
      font-family: inherit;
      transition: background 0.15s, color 0.15s;
    }
    .lang-btn:hover { background: #3d4268; color: #e2e8f0; }
    .lang-btn.active { background: #7c3aed; border-color: #7c3aed; color: #fff; }

    .nav-btn {
      background: #2d3148;
      border: none;
      color: #e2e8f0;
      width: 32px;
      height: 32px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    .nav-btn:hover { background: #3d4268; }

    .cal-weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      margin-bottom: 8px;
    }

    .cal-weekdays span {
      text-align: center;
      font-size: 0.7rem;
      font-weight: 600;
      color: #6b7280;
      padding: 4px 0;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }

    .day-cell {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      font-size: 0.85rem;
      cursor: pointer;
      border: 1px solid transparent;
      transition: background 0.12s, border-color 0.12s;
      user-select: none;
    }

    .day-cell:hover:not(.empty):not(.other-month) {
      background: #2d3148;
    }

    .day-cell.other-month {
      color: #374151;
      cursor: default;
    }

    .day-cell.today {
      border-color: #a78bfa;
      color: #a78bfa;
      font-weight: 700;
    }

    .day-cell.selected {
      background: #7c3aed;
      color: #fff;
      font-weight: 700;
      border-color: transparent;
    }

    .day-cell.selected.today { border-color: transparent; }

    /* ── TIME PICKER ── */
    .time-picker { width: 280px; }

    .time-picker h3 {
      font-size: 0.95rem;
      font-weight: 600;
      color: #a78bfa;
      margin-bottom: 16px;
    }

    .time-scroll {
      max-height: 320px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #3d4268 transparent;
    }

    .time-scroll::-webkit-scrollbar { width: 4px; }
    .time-scroll::-webkit-scrollbar-thumb { background: #3d4268; border-radius: 4px; }

    .time-slot {
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.88rem;
      color: #9ca3af;
      transition: background 0.12s, color 0.12s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .time-slot:hover { background: #2d3148; color: #e2e8f0; }

    .time-slot.selected {
      background: #7c3aed;
      color: #fff;
      font-weight: 600;
    }

    .time-slot .hour-label { font-weight: 700; font-size: 0.95rem; }

    /* ── DURATION ── */
    .duration-row {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 6px;
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid #2d3148;
    }

    .duration-row label {
      font-size: 0.82rem;
      color: #9ca3af;
    }

    .duration-select {
      background: #2d3148;
      border: 1px solid #3d4268;
      color: #e2e8f0;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 0.85rem;
      cursor: pointer;
      outline: none;
      flex: 1;
    }

    .duration-select:focus { border-color: #7c3aed; }

    /* ── RESULT ── */
    .result-card {
      width: 100%;
      max-width: 664px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .result-text {
      font-size: 1.3rem;
      font-weight: 700;
      color: #a78bfa;
      letter-spacing: 0.02em;
      font-family: 'Cascadia Code', 'Consolas', monospace;
      word-break: break-word;
    }

    .result-placeholder {
      font-size: 0.95rem;
      font-weight: 400;
      color: #4b5563;
      font-family: inherit;
    }

    .copy-btn {
      background: #7c3aed;
      border: none;
      color: #fff;
      padding: 10px 20px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.88rem;
      font-weight: 600;
      transition: background 0.15s, transform 0.1s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .copy-btn:hover { background: #6d28d9; }
    .copy-btn:active { transform: scale(0.97); }
    .copy-btn:disabled { background: #374151; color: #6b7280; cursor: default; transform: none; }
    .copy-btn.copied { background: #059669; }

    /* ── ADD / STACK ── */
    .add-btn {
      background: transparent;
      border: 1px dashed #3d4268;
      color: #a78bfa;
      padding: 7px 0;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      width: 100%;
      transition: background 0.15s, border-color 0.15s;
    }
    .add-btn:hover:not(:disabled) { background: #1e2235; border-color: #a78bfa; }
    .add-btn:disabled { color: #374151; border-color: #252840; cursor: default; }

    .stack-section {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-top: 10px;
      border-top: 1px solid #2d3148;
    }

    .stack-list { display: flex; flex-direction: column; gap: 3px; }

    .stack-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.82rem;
      color: #9ca3af;
      padding: 5px 10px;
      border-radius: 7px;
      background: #12141e;
      gap: 8px;
    }

    .stack-remove {
      background: none;
      border: none;
      color: #4b5563;
      cursor: pointer;
      font-size: 1.1rem;
      padding: 0;
      line-height: 1;
      flex-shrink: 0;
    }
    .stack-remove:hover { color: #ef4444; }

    .stack-output {
      font-size: 0.92rem;
      font-weight: 600;
      color: #a78bfa;
      font-family: 'Cascadia Code', 'Consolas', monospace;
      word-break: break-all;
      padding: 10px 12px;
      background: #12141e;
      border-radius: 8px;
      line-height: 1.5;
      min-height: 2.2em;
    }

    .aggregate-btn {
      background: #2d3148;
      border: 1px solid #3d4268;
      color: #e2e8f0;
      padding: 8px 0;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      width: 100%;
      transition: background 0.15s;
    }
    .aggregate-btn:hover { background: #3d4268; }

    .result-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .format-btns {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }

    .fmt-btn {
      background: #2d3148;
      border: 1px solid #3d4268;
      color: #9ca3af;
      width: 32px;
      height: 32px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.72rem;
      font-weight: 700;
      font-family: inherit;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .fmt-btn:hover { background: #3d4268; color: #e2e8f0; }
    .fmt-btn.active { background: #7c3aed; border-color: #7c3aed; color: #fff; }
    .fmt-btn.strike-btn { text-decoration: line-through; }
    .fmt-btn.strike-btn.active { background: #be123c; border-color: #be123c; color: #fff; }
  </style>
</head>
<body>
<div class="app">

  <!-- CALENDAR -->
  <div class="card calendar">
    <div class="lang-btns">
      <button class="lang-btn" data-lang="pl">PL</button>
      <button class="lang-btn" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="de">DE</button>
      <button class="lang-btn" data-lang="fr">FR</button>
    </div>
    <div class="cal-header">
      <button class="nav-btn" id="prevMonth">&#8249;</button>
      <h2 id="monthLabel"></h2>
      <button class="nav-btn" id="nextMonth">&#8250;</button>
    </div>
    <div class="cal-weekdays" id="calWeekdays"></div>
    <div class="cal-grid" id="calGrid"></div>
  </div>

  <!-- TIME PICKER -->
  <div class="card time-picker">
    <h3 id="timePickerLabel"></h3>
    <div class="time-scroll" id="timeScroll"></div>
    <div class="duration-row">
      <label id="durationLabel"></label>
      <select class="duration-select" id="durationSelect">
        <option value="15">15 min</option>
        <option value="30">30 min</option>
        <option value="45" selected>45 min</option>
        <option value="60">60 min</option>
        <option value="90">90 min</option>
        <option value="120">120 min</option>
      </select>
    </div>
  </div>

  <!-- RESULT -->
  <div class="card result-card">
    <div class="result-text" id="resultText">
      <span class="result-placeholder">Wybierz datę i godzinę…</span>
    </div>

    <button class="add-btn" id="addBtn" disabled>+ Dodaj</button>

    <div class="stack-section" id="stackSection" style="display:none">
      <div class="stack-list" id="stackList"></div>
      <div class="stack-output" id="stackOutput"></div>
      <button class="aggregate-btn" id="aggregateBtn">Agreguj</button>
    </div>

    <div class="result-actions">
      <div class="format-btns">
        <button class="fmt-btn" data-fmt="h1" title="Huge (Gmail Huge)">H1</button>
        <button class="fmt-btn active" data-fmt="h2" title="Large (Gmail Large)">H2</button>
        <button class="fmt-btn" data-fmt="p" title="Paragraph">P</button>
        <button class="fmt-btn" data-fmt="n" title="Normal (bez formatowania)">N</button>
        <button class="fmt-btn strike-btn" id="strikeBtn" title="Przekreślenie (strike-through)">S</button>
      </div>
      <button class="copy-btn" id="copyBtn" disabled>Kopiuj</button>
    </div>
  </div>

</div>

<script>
  const LANG = {
    pl: { timePickerLabel: 'Godzina rozpoczęcia', durationLabel: 'Czas trwania:', placeholder: 'Wybierz datę i godzinę…', addBtn: '+ Dodaj', aggregateBtn: 'Agreguj', copyBtn: 'Kopiuj', copiedBtn: 'Skopiowano!', minUnit: 'min', titleStrike: 'Przekreślenie' },
    en: { timePickerLabel: 'Start time',           durationLabel: 'Duration:',      placeholder: 'Select date and time…',   addBtn: '+ Add',    aggregateBtn: 'Aggregate',     copyBtn: 'Copy',    copiedBtn: 'Copied!',      minUnit: 'min', titleStrike: 'Strike-through' },
    de: { timePickerLabel: 'Startzeit',             durationLabel: 'Dauer:',         placeholder: 'Datum und Uhrzeit wählen…', addBtn: '+ Hinzufügen', aggregateBtn: 'Zusammenfassen', copyBtn: 'Kopieren', copiedBtn: 'Kopiert!', minUnit: 'Min.', titleStrike: 'Durchgestrichen' },
    fr: { timePickerLabel: 'Heure de début',        durationLabel: 'Durée :',        placeholder: 'Sélectionnez date et heure…', addBtn: '+ Ajouter', aggregateBtn: 'Agréger',   copyBtn: 'Copier',  copiedBtn: 'Copié !',      minUnit: 'min', titleStrike: 'Barré' },
  };

  let langCode = localStorage.getItem('lang') || (navigator.language || 'en').slice(0, 2).toLowerCase();
  if (!LANG[langCode]) langCode = 'en';
  let locale = { pl: 'pl-PL', en: 'en-US', de: 'de-DE', fr: 'fr-FR' }[langCode];
  let t      = LANG[langCode];

  let viewYear, viewMonth;
  let selectedDate = null;
  let selectedMinutes = null;
  let currentFormat = 'h2';
  let strikethrough = false;
  let stack = [];
  let aggregateLevel = 0;

  const today = new Date();

  function init() {
    viewYear = today.getFullYear();
    viewMonth = today.getMonth();
    applyLang();
    renderCalendar();
    renderTimeSlots();
    document.getElementById('prevMonth').addEventListener('click', () => { shiftMonth(-1); });
    document.getElementById('nextMonth').addEventListener('click', () => { shiftMonth(1); });
    document.getElementById('durationSelect').addEventListener('change', updateResult);
    document.getElementById('copyBtn').addEventListener('click', copyResult);
    document.getElementById('addBtn').addEventListener('click', addToStack);
    document.getElementById('aggregateBtn').addEventListener('click', aggregate);
    document.querySelectorAll('.fmt-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        currentFormat = btn.dataset.fmt;
        document.querySelectorAll('.fmt-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        updateResult();
        if (stack.length > 0) applyPreviewFormat(document.getElementById('stackOutput'));
      });
    });
    document.querySelectorAll('.lang-btn').forEach(btn => {
      btn.classList.toggle('active', btn.dataset.lang === langCode);
      btn.addEventListener('click', () => switchLang(btn.dataset.lang));
    });
    document.getElementById('strikeBtn').addEventListener('click', () => {
      strikethrough = !strikethrough;
      document.getElementById('strikeBtn').classList.toggle('active', strikethrough);
      updateResult();
      if (stack.length > 0) applyPreviewFormat(document.getElementById('stackOutput'));
    });
  }

  function switchLang(code) {
    langCode = code;
    locale   = { pl: 'pl-PL', en: 'en-US', de: 'de-DE', fr: 'fr-FR' }[langCode];
    t        = LANG[langCode];
    localStorage.setItem('lang', langCode);
    stack.forEach(it => {
      it.dayName = new Intl.DateTimeFormat(locale, { weekday: 'long' }).format(new Date(it.year, it.month, it.day));
    });
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === langCode));
    applyLang();
    renderCalendar();
    updateResult();
    if (stack.length > 0) renderStackSection();
  }

  function applyLang() {
    document.getElementById('timePickerLabel').textContent = t.timePickerLabel;
    document.getElementById('durationLabel').textContent   = t.durationLabel;
    document.getElementById('addBtn').textContent          = t.addBtn;
    document.getElementById('aggregateBtn').textContent    = t.aggregateBtn;
    document.getElementById('copyBtn').textContent         = t.copyBtn;
    document.getElementById('strikeBtn').title             = t.titleStrike;
    document.querySelectorAll('#durationSelect option').forEach(opt => {
      opt.textContent = `${opt.value} ${t.minUnit}`;
    });
    const calWeekdays = document.getElementById('calWeekdays');
    calWeekdays.innerHTML = '';
    for (let i = 0; i < 7; i++) {
      const span = document.createElement('span');
      span.textContent = new Intl.DateTimeFormat(locale, { weekday: 'short' }).format(new Date(2024, 0, 1 + i));
      calWeekdays.appendChild(span);
    }
  }

  function shiftMonth(delta) {
    viewMonth += delta;
    if (viewMonth < 0)  { viewMonth = 11; viewYear--; }
    if (viewMonth > 11) { viewMonth = 0;  viewYear++; }
    renderCalendar();
  }

  function renderCalendar() {
    const monthName = new Intl.DateTimeFormat(locale, { month: 'long' }).format(new Date(viewYear, viewMonth, 1));
    document.getElementById('monthLabel').textContent =
      monthName.charAt(0).toUpperCase() + monthName.slice(1) + ' ' + viewYear;

    const grid = document.getElementById('calGrid');
    grid.innerHTML = '';

    const firstDay = new Date(viewYear, viewMonth, 1).getDay();
    // Monday-based: shift so Monday=0
    const startOffset = (firstDay + 6) % 7;
    const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
    const daysInPrev  = new Date(viewYear, viewMonth, 0).getDate();

    // prev month filler
    for (let i = startOffset - 1; i >= 0; i--) {
      grid.appendChild(makeCell(daysInPrev - i, true));
    }

    // current month
    for (let d = 1; d <= daysInMonth; d++) {
      const isToday =
        d === today.getDate() &&
        viewMonth === today.getMonth() &&
        viewYear === today.getFullYear();
      const isSel =
        selectedDate &&
        selectedDate.day === d &&
        selectedDate.month === viewMonth &&
        selectedDate.year === viewYear;
      const cell = makeCell(d, false, isToday, isSel);
      cell.addEventListener('click', () => selectDay(d));
      grid.appendChild(cell);
    }

    // next month filler
    const total = startOffset + daysInMonth;
    const remain = total % 7 === 0 ? 0 : 7 - (total % 7);
    for (let d = 1; d <= remain; d++) {
      grid.appendChild(makeCell(d, true));
    }
  }

  function makeCell(day, otherMonth, isToday = false, isSel = false) {
    const el = document.createElement('div');
    el.className = 'day-cell';
    if (otherMonth) el.classList.add('other-month');
    if (isToday)    el.classList.add('today');
    if (isSel)      el.classList.add('selected');
    el.textContent = day;
    return el;
  }

  function selectDay(d) {
    selectedDate = { year: viewYear, month: viewMonth, day: d };
    renderCalendar();
    updateResult();
  }

  function renderTimeSlots() {
    const container = document.getElementById('timeScroll');
    container.innerHTML = '';
    for (let h = 6; h <= 22; h++) {
      for (let m = 0; m < 60; m += 15) {
        const minutes = h * 60 + m;
        const slot = document.createElement('div');
        slot.className = 'time-slot';
        slot.dataset.minutes = minutes;

        const hourSpan = document.createElement('span');
        hourSpan.className = 'hour-label';
        hourSpan.textContent = pad(h) + ':' + pad(m);
        slot.appendChild(hourSpan);

        if (m !== 0) {
          slot.style.paddingTop = '4px';
          slot.style.paddingBottom = '4px';
          hourSpan.style.fontWeight = '400';
          hourSpan.style.fontSize = '0.82rem';
          hourSpan.style.color = '#6b7280';
        }

        slot.addEventListener('click', () => selectTime(minutes, slot));
        container.appendChild(slot);
      }
    }
  }

  function selectTime(minutes, el) {
    selectedMinutes = minutes;
    document.querySelectorAll('.time-slot').forEach(s => s.classList.remove('selected'));
    el.classList.add('selected');
    el.scrollIntoView({ block: 'nearest' });
    updateResult();
  }

  function updateResult() {
    const resultEl = document.getElementById('resultText');
    const addBtn   = document.getElementById('addBtn');

    if (!selectedDate) {
      resultEl.innerHTML = `<span class="result-placeholder">${t.placeholder}</span>`;
      resultEl.style.fontSize = '';
      resultEl.style.fontWeight = '';
      resultEl.style.opacity = '';
      resultEl.style.textDecoration = '';
      addBtn.disabled = true;
      updateCopyBtn();
      return;
    }

    const { year, month, day } = selectedDate;
    const dayName = new Intl.DateTimeFormat(locale, { weekday: 'long' }).format(new Date(year, month, day));
    const dateStr = pad(day) + '.' + pad(month + 1) + '.' + year;

    let result;
    if (selectedMinutes !== null) {
      const duration = parseInt(document.getElementById('durationSelect').value, 10);
      result = `${dateStr} (${dayName}) ${minsToTime(selectedMinutes)}-${minsToTime(selectedMinutes + duration)}`;
    } else {
      result = `${dateStr} (${dayName})`;
    }

    resultEl.textContent = result;
    applyPreviewFormat(resultEl);
    addBtn.disabled = stack.length >= 10;
    updateCopyBtn();
  }

  function updateCopyBtn() {
    const copyBtn = document.getElementById('copyBtn');
    copyBtn.disabled = !(stack.length > 0 || selectedDate !== null);
    if (!copyBtn.disabled) { copyBtn.textContent = t.copyBtn; copyBtn.classList.remove('copied'); }
  }

  /* ── STACK ── */

  function addToStack() {
    if (!selectedDate || stack.length >= 10) return;
    const { year, month, day } = selectedDate;
    const dayName = new Intl.DateTimeFormat(locale, { weekday: 'long' }).format(new Date(year, month, day));
    const dateStr = pad(day) + '.' + pad(month + 1) + '.' + year;
    let entry;
    if (selectedMinutes !== null) {
      const duration = parseInt(document.getElementById('durationSelect').value, 10);
      entry = {
        year, month, day, dateStr, dayName,
        startMinutes: selectedMinutes,
        startStr:     minsToTime(selectedMinutes),
        endStr:       minsToTime(selectedMinutes + duration)
      };
    } else {
      entry = { year, month, day, dateStr, dayName, startMinutes: -1, startStr: null, endStr: null };
    }
    stack.push(entry);
    stack.sort((a, b) => {
      const dd = new Date(a.year, a.month, a.day) - new Date(b.year, b.month, b.day);
      return dd !== 0 ? dd : a.startMinutes - b.startMinutes;
    });
    aggregateLevel = 0;
    renderStackSection();
    document.getElementById('addBtn').disabled = stack.length >= 10;
    updateCopyBtn();
  }

  function removeFromStack(idx) {
    stack.splice(idx, 1);
    if (stack.length === 0) aggregateLevel = 0;
    renderStackSection();
    if (selectedDate && selectedMinutes !== null)
      document.getElementById('addBtn').disabled = false;
    updateCopyBtn();
  }

  function itemLabel(it, withDay = true, withTime = true, skipDateIfSame = false, lastDate = null) {
    const time = it.startStr ? ` ${it.startStr}-${it.endStr}` : '';
    const day  = withDay ? ` (${it.dayName})` : '';
    if (skipDateIfSame && it.dateStr === lastDate) return it.startStr ? `${it.startStr}-${it.endStr}` : it.dateStr;
    return withDay ? `${it.dateStr}${day}${withTime ? time : ''}` : `${it.dateStr}${withTime ? time : ''}`;
  }

  function getAggregatedText() {
    if (stack.length === 0) return '';
    switch (aggregateLevel) {
      case 0: return stack.map(it => itemLabel(it, true, true)).join(', ');
      case 1: return stack.map(it => itemLabel(it, false, true)).join(', ');
      case 2: {
        const parts = []; let lastDate = null;
        for (const it of stack) {
          parts.push(itemLabel(it, false, true, true, lastDate));
          lastDate = it.dateStr;
        }
        return parts.join(', ');
      }
      case 3: return [...new Set(stack.map(it => it.dateStr))].join(', ');
      case 4: return [...new Map(stack.map(it => [it.dateStr, it])).values()]
                      .map(it => `${it.dateStr} (${it.dayName})`).join(', ');
    }
    return '';
  }

  function renderStackSection() {
    const section = document.getElementById('stackSection');
    const list    = document.getElementById('stackList');
    const output  = document.getElementById('stackOutput');
    if (stack.length === 0) { section.style.display = 'none'; return; }
    section.style.display = 'flex';
    list.innerHTML = '';
    stack.forEach((it, i) => {
      const el   = document.createElement('div');
      el.className = 'stack-item';
      const span = document.createElement('span');
      span.textContent = it.startStr
        ? `${it.dateStr} (${it.dayName}) ${it.startStr}-${it.endStr}`
        : `${it.dateStr} (${it.dayName})`;
      const btn  = document.createElement('button');
      btn.className   = 'stack-remove';
      btn.textContent = '×';
      btn.addEventListener('click', () => removeFromStack(i));
      el.appendChild(span);
      el.appendChild(btn);
      list.appendChild(el);
    });
    output.textContent = getAggregatedText();
    applyPreviewFormat(output);
  }

  function aggregate() {
    if (stack.length === 0) return;
    aggregateLevel = (aggregateLevel + 1) % 5;
    renderStackSection();
  }

  function applyPreviewFormat(el) {
    const sizes   = { h1: '1.8rem', h2: '1.3rem', p: '1rem',  n: '0.88rem' };
    const weights = { h1: '700',    h2: '700',     p: '400',   n: '400'     };
    const opacity = { h1: '1',      h2: '1',       p: '0.85',  n: '0.6'    };
    el.style.fontSize      = sizes[currentFormat];
    el.style.fontWeight    = weights[currentFormat];
    el.style.opacity       = opacity[currentFormat];
    el.style.textDecoration = strikethrough ? 'line-through' : '';
  }

  function copyResult() {
    const text = stack.length > 0
      ? document.getElementById('stackOutput').textContent
      : document.getElementById('resultText').textContent;
    const wrap = (inner) => strikethrough ? `<s>${inner}</s>` : inner;
    const htmlMap = {
      h1: wrap(`<font size="6">${text}</font>`),
      h2: wrap(`<font size="4">${text}</font>`),
      p:  wrap(`<font size="3">${text}</font>`),
      n:  wrap(text),
    };
    const btn = document.getElementById('copyBtn');
    let promise;
    if (currentFormat === 'n' && !strikethrough) {
      promise = navigator.clipboard.writeText(text);
    } else {
      const item = new ClipboardItem({
        'text/html':  new Blob([htmlMap[currentFormat]], { type: 'text/html' }),
        'text/plain': new Blob([text], { type: 'text/plain' }),
      });
      promise = navigator.clipboard.write([item]);
    }
    promise.then(() => {
      btn.textContent = t.copiedBtn;
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = t.copyBtn;
        btn.classList.remove('copied');
      }, 2000);
    });
  }

  function minsToTime(m) {
    const h = Math.floor(m / 60) % 24;
    const min = m % 60;
    return pad(h) + ':' + pad(min);
  }

  function pad(n) { return String(n).padStart(2, '0'); }

  init();
</script>
</body>
