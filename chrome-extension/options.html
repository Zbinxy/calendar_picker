<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Calendar Picker — Language</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      padding: 24px;
      min-width: 220px;
    }
    h2 {
      font-size: 0.95rem;
      font-weight: 600;
      color: #a78bfa;
      margin-bottom: 16px;
    }
    .radio-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .radio-group label {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.88rem;
      color: #e2e8f0;
      cursor: pointer;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid transparent;
      transition: background 0.12s, border-color 0.12s;
    }
    .radio-group label:hover { background: #1e2235; border-color: #3d4268; }
    .radio-group input[type="radio"] { accent-color: #7c3aed; width: 15px; height: 15px; cursor: pointer; }
    .radio-group input[type="radio"]:checked + span { color: #a78bfa; font-weight: 600; }
    #status { font-size: 0.75rem; color: #059669; margin-top: 14px; min-height: 1.2em; }
  </style>
</head>
<body>
  <h2>Language / Język / Sprache / Langue</h2>
  <div class="radio-group">
    <label><input type="radio" name="lang" value=""> <span>Auto (browser default)</span></label>
    <label><input type="radio" name="lang" value="pl"> <span>Polski</span></label>
    <label><input type="radio" name="lang" value="en"> <span>English</span></label>
    <label><input type="radio" name="lang" value="de"> <span>Deutsch</span></label>
    <label><input type="radio" name="lang" value="fr"> <span>Français</span></label>
  </div>
  <div id="status"></div>
  <script src="options.js"></script>
</body>
</html>
