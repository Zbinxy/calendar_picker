<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendar Picker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      padding: 12px;
      overflow-x: hidden;
    }

    .app {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card {
      background: #1a1d27;
      border: 1px solid #2d3148;
      border-radius: 14px;
      padding: 16px;
    }

    /* ── CALENDAR ── */
    .cal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .cal-header h2 {
      font-size: 1rem;
      font-weight: 600;
      text-transform: capitalize;
      color: #a78bfa;
    }

    .nav-btn {
      background: #2d3148;
      border: none;
      color: #e2e8f0;
      width: 28px;
      height: 28px;
      border-radius: 7px;
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    .nav-btn:hover { background: #3d4268; }

    .cal-weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      margin-bottom: 6px;
    }

    .cal-weekdays span {
      text-align: center;
      font-size: 0.65rem;
      font-weight: 600;
      color: #6b7280;
      padding: 3px 0;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
    }

    .day-cell {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 7px;
      font-size: 0.78rem;
      cursor: pointer;
      border: 1px solid transparent;
      transition: background 0.12s, border-color 0.12s;
      user-select: none;
    }

    .day-cell:hover:not(.empty):not(.other-month) { background: #2d3148; }
    .day-cell.other-month { color: #374151; cursor: default; }
    .day-cell.today { border-color: #a78bfa; color: #a78bfa; font-weight: 700; }
    .day-cell.selected { background: #7c3aed; color: #fff; font-weight: 700; border-color: transparent; }
    .day-cell.selected.today { border-color: transparent; }

    /* ── TIME PICKER ── */
    .time-picker h3 {
      font-size: 0.85rem;
      font-weight: 600;
      color: #a78bfa;
      margin-bottom: 10px;
    }

    .time-scroll {
      max-height: 180px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #3d4268 transparent;
    }

    .time-scroll::-webkit-scrollbar { width: 4px; }
    .time-scroll::-webkit-scrollbar-thumb { background: #3d4268; border-radius: 4px; }

    .time-slot {
      padding: 6px 10px;
      border-radius: 7px;
      cursor: pointer;
      font-size: 0.82rem;
      color: #9ca3af;
      transition: background 0.12s, color 0.12s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .time-slot:hover { background: #2d3148; color: #e2e8f0; }
    .time-slot.selected { background: #7c3aed; color: #fff; font-weight: 600; }
    .time-slot .hour-label { font-weight: 700; font-size: 0.88rem; }

    /* ── DURATION ── */
    .duration-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #2d3148;
    }

    .duration-row label { font-size: 0.78rem; color: #9ca3af; white-space: nowrap; }

    .duration-select {
      background: #2d3148;
      border: 1px solid #3d4268;
      color: #e2e8f0;
      border-radius: 7px;
      padding: 5px 8px;
      font-size: 0.8rem;
      cursor: pointer;
      outline: none;
      flex: 1;
    }
    .duration-select:focus { border-color: #7c3aed; }

    /* ── RESULT ── */
    .result-card {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .result-text {
      font-size: 1.05rem;
      font-weight: 700;
      color: #a78bfa;
      letter-spacing: 0.02em;
      font-family: 'Cascadia Code', 'Consolas', monospace;
      word-break: break-all;
      min-height: 1.4em;
    }

    .result-placeholder {
      font-size: 0.85rem;
      font-weight: 400;
      color: #4b5563;
      font-family: inherit;
    }

    .copy-btn {
      background: #7c3aed;
      border: none;
      color: #fff;
      padding: 9px 0;
      border-radius: 9px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      transition: background 0.15s, transform 0.1s;
      width: 100%;
    }

    .copy-btn:hover { background: #6d28d9; }
    .copy-btn:active { transform: scale(0.98); }
    .copy-btn:disabled { background: #374151; color: #6b7280; cursor: default; transform: none; }
    .copy-btn.copied { background: #059669; }
  </style>
</head>
<body>
<div class="app">

  <!-- CALENDAR -->
  <div class="card">
    <div class="cal-header">
      <button class="nav-btn" id="prevMonth">&#8249;</button>
      <h2 id="monthLabel"></h2>
      <button class="nav-btn" id="nextMonth">&#8250;</button>
    </div>
    <div class="cal-weekdays">
      <span>Pn</span><span>Wt</span><span>Śr</span>
      <span>Cz</span><span>Pt</span><span>So</span><span>Nd</span>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  </div>

  <!-- TIME PICKER -->
  <div class="card time-picker">
    <h3>Godzina rozpoczęcia</h3>
    <div class="time-scroll" id="timeScroll"></div>
    <div class="duration-row">
      <label>Czas trwania:</label>
      <select class="duration-select" id="durationSelect">
        <option value="15">15 min</option>
        <option value="30">30 min</option>
        <option value="45" selected>45 min</option>
        <option value="60">60 min</option>
        <option value="90">90 min</option>
        <option value="120">120 min</option>
      </select>
    </div>
  </div>

  <!-- RESULT -->
  <div class="card result-card">
    <div class="result-text" id="resultText">
      <span class="result-placeholder">Wybierz datę i godzinę…</span>
    </div>
    <button class="copy-btn" id="copyBtn" disabled>Kopiuj</button>
  </div>

</div>

<script>
  const MONTHS_PL = [
    'Styczeń','Luty','Marzec','Kwiecień','Maj','Czerwiec',
    'Lipiec','Sierpień','Wrzesień','Październik','Listopad','Grudzień'
  ];
  const DAYS_PL = [
    'niedziela','poniedziałek','wtorek','środa',
    'czwartek','piątek','sobota'
  ];

  let viewYear, viewMonth;
  let selectedDate = null;
  let selectedMinutes = null;

  const today = new Date();

  function init() {
    viewYear = today.getFullYear();
    viewMonth = today.getMonth();
    renderCalendar();
    renderTimeSlots();
    document.getElementById('prevMonth').addEventListener('click', () => shiftMonth(-1));
    document.getElementById('nextMonth').addEventListener('click', () => shiftMonth(1));
    document.getElementById('durationSelect').addEventListener('change', updateResult);
    document.getElementById('copyBtn').addEventListener('click', copyResult);
  }

  function shiftMonth(delta) {
    viewMonth += delta;
    if (viewMonth < 0)  { viewMonth = 11; viewYear--; }
    if (viewMonth > 11) { viewMonth = 0;  viewYear++; }
    renderCalendar();
  }

  function renderCalendar() {
    document.getElementById('monthLabel').textContent =
      `${MONTHS_PL[viewMonth]} ${viewYear}`;

    const grid = document.getElementById('calGrid');
    grid.innerHTML = '';

    const firstDay   = new Date(viewYear, viewMonth, 1).getDay();
    const startOffset = (firstDay + 6) % 7;
    const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
    const daysInPrev  = new Date(viewYear, viewMonth, 0).getDate();

    for (let i = startOffset - 1; i >= 0; i--)
      grid.appendChild(makeCell(daysInPrev - i, true));

    for (let d = 1; d <= daysInMonth; d++) {
      const isToday =
        d === today.getDate() &&
        viewMonth === today.getMonth() &&
        viewYear === today.getFullYear();
      const isSel =
        selectedDate &&
        selectedDate.day === d &&
        selectedDate.month === viewMonth &&
        selectedDate.year === viewYear;
      const cell = makeCell(d, false, isToday, isSel);
      cell.addEventListener('click', () => selectDay(d));
      grid.appendChild(cell);
    }

    const total = startOffset + daysInMonth;
    const remain = total % 7 === 0 ? 0 : 7 - (total % 7);
    for (let d = 1; d <= remain; d++)
      grid.appendChild(makeCell(d, true));
  }

  function makeCell(day, otherMonth, isToday = false, isSel = false) {
    const el = document.createElement('div');
    el.className = 'day-cell';
    if (otherMonth) el.classList.add('other-month');
    if (isToday)    el.classList.add('today');
    if (isSel)      el.classList.add('selected');
    el.textContent = day;
    return el;
  }

  function selectDay(d) {
    selectedDate = { year: viewYear, month: viewMonth, day: d };
    renderCalendar();
    updateResult();
  }

  function renderTimeSlots() {
    const container = document.getElementById('timeScroll');
    container.innerHTML = '';
    for (let h = 6; h <= 22; h++) {
      for (let m = 0; m < 60; m += 15) {
        const minutes = h * 60 + m;
        const slot = document.createElement('div');
        slot.className = 'time-slot';
        slot.dataset.minutes = minutes;

        const hourSpan = document.createElement('span');
        hourSpan.className = 'hour-label';
        hourSpan.textContent = pad(h) + ':' + pad(m);
        slot.appendChild(hourSpan);

        if (m !== 0) {
          slot.style.paddingTop = '3px';
          slot.style.paddingBottom = '3px';
          hourSpan.style.fontWeight = '400';
          hourSpan.style.fontSize = '0.78rem';
          hourSpan.style.color = '#6b7280';
        }

        slot.addEventListener('click', () => selectTime(minutes, slot));
        container.appendChild(slot);
      }
    }
  }

  function selectTime(minutes, el) {
    selectedMinutes = minutes;
    document.querySelectorAll('.time-slot').forEach(s => s.classList.remove('selected'));
    el.classList.add('selected');
    el.scrollIntoView({ block: 'nearest' });
    updateResult();
  }

  function updateResult() {
    const resultEl = document.getElementById('resultText');
    const copyBtn  = document.getElementById('copyBtn');

    if (!selectedDate || selectedMinutes === null) {
      resultEl.innerHTML = '<span class="result-placeholder">Wybierz datę i godzinę…</span>';
      copyBtn.disabled = true;
      return;
    }

    const { year, month, day } = selectedDate;
    const dow     = new Date(year, month, day).getDay();
    const dayName = DAYS_PL[dow];

    const duration   = parseInt(document.getElementById('durationSelect').value, 10);
    const endMinutes = selectedMinutes + duration;

    const startStr = minsToTime(selectedMinutes);
    const endStr   = minsToTime(endMinutes);
    const dateStr  = pad(day) + '.' + pad(month + 1) + '.' + year;
    const result   = `${dateStr} (${dayName}) ${startStr}-${endStr}`;

    resultEl.textContent = result;
    copyBtn.disabled = false;
    copyBtn.textContent = 'Kopiuj';
    copyBtn.classList.remove('copied');
  }

  function copyResult() {
    const text = document.getElementById('resultText').textContent;
    const html = `<font size="4">${text}</font>`;
    const item = new ClipboardItem({
      'text/html':  new Blob([html],  { type: 'text/html' }),
      'text/plain': new Blob([text], { type: 'text/plain' }),
    });
    navigator.clipboard.write([item]).then(() => {
      const btn = document.getElementById('copyBtn');
      btn.textContent = 'Skopiowano!';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = 'Kopiuj';
        btn.classList.remove('copied');
      }, 2000);
    });
  }

  function minsToTime(m) {
    const h = Math.floor(m / 60) % 24;
    const min = m % 60;
    return pad(h) + ':' + pad(min);
  }

  function pad(n) { return String(n).padStart(2, '0'); }

  init();
</script>
</body>
</html>
