<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5b21b6"/>
      <stop offset="100%" stop-color="#9333ea"/>
    </linearGradient>
  </defs>
  <rect width="48" height="48" rx="12" fill="url(#bg)"/>
  <!-- calendar shell -->
  <rect x="8" y="14" width="32" height="25" rx="4" fill="none" stroke="white" stroke-width="2"/>
  <!-- header fill -->
  <rect x="8" y="14" width="32" height="9" rx="4" fill="white" opacity="0.25"/>
  <rect x="8" y="19" width="32" height="4" fill="white" opacity="0.25"/>
  <!-- hooks -->
  <rect x="15" y="9" width="3" height="9" rx="1.5" fill="white"/>
  <rect x="30" y="9" width="3" height="9" rx="1.5" fill="white"/>
  <!-- day grid 3x2 -->
  <rect x="12" y="28" width="6" height="5" rx="1.5" fill="white"/>
  <rect x="21" y="28" width="6" height="5" rx="1.5" fill="white" opacity="0.7"/>
  <rect x="30" y="28" width="6" height="5" rx="1.5" fill="white" opacity="0.35"/>
  <rect x="12" y="34.5" width="6" height="4" rx="1.5" fill="white" opacity="0.6"/>
  <rect x="21" y="34.5" width="6" height="4" rx="1.5" fill="white" opacity="0.35"/>
</svg>
